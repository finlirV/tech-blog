# Butterfly 主题配置
# 基于设计文档：经典博客布局 + overreacted.io 视觉风格

# 主题版本
version: 4.14.1

# 主题配置
theme:
  # 主题颜色
  color: '#3eaf7c'
  # 主题模式：auto | light | dark
  mode: 'auto'
  # 主题模式切换
  mode_switch: true

# 网站信息
site:
  # 网站图标
  favicon: /img/favicon.png
  # 网站图标（苹果）
  apple_touch_icon: /img/apple-touch-icon.png
  # 网站标题
  title: Tech Insights
  # 网站副标题
  subtitle: '技术分析 & 深度思考'
  # 网站描述
  description: '专注于前端、架构与工程实践的技术博客'
  # 关键词
  keywords: 技术博客,前端,架构,编程,深度分析
  # 作者
  author: Developer
  # 语言
  language: zh-CN
  # 时区
  timezone: Asia/Shanghai

# 导航菜单
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-user

# 侧边栏
aside:
  # 侧边栏位置：left | right
  position: right
  # 侧边栏显示条件：always | hide | remove
  display: post
  # 侧边栏宽度
  width: 300px
  # 侧边栏卡片间距
  card_style: 1

# 页面布局
page:
  # 文章列表布局
  default_post_layout: 1
  # 文章间距
  post_spacing: 20px
  # 文章阴影
  post_shadow: true

# 文章配置
post:
  # 文章标题
  title:
    # 标题大小
    size: 2.2rem
    # 标题颜色
    color: '#2c3e50'
  # 文章元信息
  meta:
    # 发布日期
    date: true
    # 更新日期
    updated: true
    # 字数统计
    wordcount: true
    # 阅读时长
    min2read: true
    # 分类
    categories: true
    # 标签
    tags: true
  # 代码高亮
  code:
    # 代码块主题
    theme: 'atom-one-dark'
    # 复制按钮
    copy: true
    # 行号
    line_number: true
    # 代码块高度限制
    max_height: 400px

# 评论系统 (Giscus)
comment:
  type: giscus
  giscus:
    # Giscus 配置
    repo: your-username/your-repo
    repo_id: your-repo-id
    category: Announcements
    category_id: your-category-id
    mapping: pathname
    strict: 0
    reactions_enabled: 1
    emit_metadata: 0
    input_position: bottom
    theme: preferred_color_scheme
    lang: zh-CN

# 搜索系统 (Algolia)
search:
  type: algolia
  algolia:
    appId: your-app-id
    apiKey: your-api-key
    indexName: your-index-name
    hits:
      per_page: 10

# 统计系统 (Google Analytics)
analytics:
  google:
    tracking_id: your-tracking-id

# 暗色模式配置
darkmode:
  # 暗色模式开关
  enable: true
  # 按钮位置
  button: 'header'
  # 自动切换
  autoChangeMode: 1

# 动画效果
motion:
  # 页面切换动画
  transition: true
  # 文章列表动画
  post_list: true
  # 侧边栏动画
  sidebar: true

# 自定义样式注入
inject:
  head:
    - <link rel="stylesheet" href="/css/custom.css">
  bottom:
    - <script src="/js/custom.js"></script>