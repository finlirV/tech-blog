# Butterfly 主题配置
# 基于设计文档：经典博客布局 + overreacted.io 视觉风格

# 主题版本
version: 4.14.1

# 主题配置
theme:
  # 主题颜色
  color: '#3eaf7c'
  # 主题模式：auto | light | dark
  mode: 'auto'
  # 主题模式切换
  mode_switch: true

# 网站信息
site:
  # 网站图标
  favicon: /img/favicon.png
  # 网站图标（苹果）
  apple_touch_icon: /img/apple-touch-icon.png
  # 网站标题
  title: Tech Insights
  # 网站副标题
  subtitle: '技术分析 & 深度思考'
  # 网站描述
  description: '专注于前端、架构与工程实践的技术博客'
  # 关键词
  keywords: 技术博客,前端,架构,编程,深度分析
  # 作者
  author: Developer
  # 语言
  language: zh-CN
  # 时区
  timezone: Asia/Shanghai

# 导航菜单
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-user

# 侧边栏 - 隐藏以匹配 overreacted.io 极简风格
aside:
  # 侧边栏位置：left | right
  position: right
  # 侧边栏显示条件：always | hide | remove
  display: remove
  # 侧边栏宽度
  width: 300px
  # 侧边栏卡片间距
  card_style: 1

# 页面布局 - overreacted.io 极简风格
page:
  # 文章列表布局
  default_post_layout: 1
  # 文章间距
  post_spacing: 0px
  # 文章阴影 - 关闭
  post_shadow: false

# 文章配置 - overreacted.io 极简风格
post:
  # 文章标题
  title:
    # 标题大小
    size: 1.75rem
    # 标题颜色
    color: '#222222'
  # 文章元信息 - 极简化
  meta:
    # 发布日期
    date: true
    # 更新日期
    updated: false
    # 字数统计
    wordcount: false
    # 阅读时长
    min2read: false
    # 分类
    categories: false
    # 标签
    tags: false
  # 代码高亮
  code:
    # 代码块主题
    theme: 'atom-one-dark'
    # 复制按钮
    copy: true
    # 行号
    line_number: true
    # 代码块高度限制
    max_height: 400px
  # 隐藏版权和打赏
  copyright: false
  reward: false

# 评论系统 - 隐藏以匹配 overreacted.io 极简风格
comment:
  type: false

# 搜索系统 - 隐藏以匹配 overreacted.io 极简风格
search:
  type: false

# 统计系统 - 隐藏以匹配 overreacted.io 极简风格
analytics:
  google: false

# 暗色模式配置
darkmode:
  # 暗色模式开关
  enable: true
  # 按钮位置
  button: 'header'
  # 自动切换
  autoChangeMode: 1

# 动画效果 - overreacted.io 极简风格
motion:
  # 页面切换动画
  transition: false
  # 文章列表动画
  post_list: false
  # 侧边栏动画
  sidebar: false

# 自定义样式注入 - overreacted.io 样式
inject:
  head:
    - <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    - <link rel="stylesheet" href="/tech-blog/css/overreacted.css">
  bottom:
    - <script src="/tech-blog/js/overreacted.js"></script>